name: Deploy svc-ingestion

on:
  push:
    branches: [main]
    paths:
      - "services/svc-ingestion/**"
      - "packages/types/**"
      - "packages/utils/**"
      - ".github/workflows/deploy-svc-ingestion.yml"

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck svc-ingestion
        run: bun run typecheck --filter=@ai-foundry/svc-ingestion

      - name: Deploy svc-ingestion
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: services/svc-ingestion
        env:
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
