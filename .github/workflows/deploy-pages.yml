name: Deploy app-web (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - "apps/app-web/**"
      - "packages/types/**"
      - ".github/workflows/deploy-pages.yml"

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck app-web
        run: bun run typecheck --filter=@ai-foundry/app-web

      - name: Build app-web
        run: bun run build --filter=@ai-foundry/app-web
        working-directory: apps/app-web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ai-foundry-app-web
          workingDirectory: apps/app-web
